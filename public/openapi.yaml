  # ========================================================
  # VIAJES
  # ========================================================
  /viajes:
    get:
      summary: Listar viajes
      description: Obtiene el registro completo de viajes comerciales con su vehículo, conductor y trayectos incluidos.
      tags:
        - Viajes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Listado exitoso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Viaje'
    post:
      summary: Registrar viaje
      description: Crea una ruta general de viaje, recalculando automáticamente el kilometraje del odómetro del vehículo al cerrarse o al registrar kmLlegada.
      tags:
        - Viajes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descripcion:
                  type: string
                kmSalida:
                  type: number
                kmLlegada:
                  type: number
                origen:
                  type: string
                destino:
                  type: string
                porcentajeCombustibleInicio:
                  type: number
                porcentajeCombustibleFinal:
                  type: number
                litrosCombustibleInicio:
                  type: number
                litrosCombustibleFinal:
                  type: number
                visible:
                  type: boolean
                fechaSalida:
                  type: string
                  format: date-time
                fechaLlegada:
                  type: string
                  format: date-time
                vehiculoMatricula:
                  type: string
                conductorDni:
                  type: string
                revisionId:
                  type: string
                  format: uuid
                trayectos:
                  type: array
                  items:
                    type: object
                    properties:
                      horaSalida:
                        type: string
                        format: date-time
                      horaLlegada:
                        type: string
                        format: date-time
                      origen:
                        type: string
                      destino:
                        type: string
                      distanciaEnKm:
                        type: integer
                    required: [horaSalida, horaLlegada, origen, destino, distanciaEnKm]
                estado:
                  $ref: '#/components/schemas/ESTADO_VIAJE'
              required: [descripcion, origen, destino]
      responses:
        '201':
          description: Viaje creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viaje'
        '401':
          description: No autorizado.

  /viajes/{id}:
    get:
      summary: Obtener viaje por ID
      tags:
        - Viajes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ficha de viaje.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viaje'
        '404':
          description: Viaje no encontrado.
    patch:
      summary: Actualizar viaje
      description: Modifica campos de viaje y actualiza proporcionalmente los km totales del vehículo en base a la diferencia entre kmSalida y kmLlegada.
      tags:
        - Viajes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descripcion:
                  type: string
                kmSalida:
                  type: number
                kmLlegada:
                  type: number
                origen:
                  type: string
                destino:
                  type: string
                porcentajeCombustibleInicio:
                  type: number
                porcentajeCombustibleFinal:
                  type: number
                litrosCombustibleInicio:
                  type: number
                litrosCombustibleFinal:
                  type: number
                visible:
                  type: boolean
                fechaSalida:
                  type: string
                  format: date-time
                fechaLlegada:
                  type: string
                  format: date-time
                vehiculoMatricula:
                  type: string
                conductorDni:
                  type: string
                estado:
                  $ref: '#/components/schemas/ESTADO_VIAJE'
      responses:
        '200':
          description: Viaje actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viaje'
        '404':
          description: Viaje no encontrado.
    delete:
      summary: Eliminar viaje
      tags:
        - Viajes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Viaje eliminado.
        '404':
          description: Viaje no encontrado.
        '401':
          description: No autorizado.

  # ========================================================
  # REVISIONES
  # ========================================================
  /revisiones:
    get:
      summary: Listar revisiones de vehículos
      description: Obtiene revisiones programadas o pasadas. Permite filtrar revisiones ocultas o borradas lógicamente con el parámetro `visible`.
      tags:
        - Revisiones
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: visible
          in: query
          schema:
            type: string
            enum: [all, false, true]
            default: "true"
          description: Filtro especial. Si es 'all' muestra todo, si es 'false' muestra sólo las no visibles.
      responses:
        '200':
          description: Lista de revisiones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Revision'
    post:
      summary: Programar o registrar revisión
      description: Crea una revisión periódica sobre un vehículo.
      tags:
        - Revisiones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descripcion:
                  type: string
                lugar:
                  type: string
                aprobada:
                  type: boolean
                fecha:
                  type: string
                  format: date-time
                costo:
                  type: number
                visible:
                  type: boolean
                vehiculoMatricula:
                  type: string
                viajeId:
                  type: string
                  format: uuid
                plantillaId:
                  type: string
                  format: uuid
                kilometrosActuales:
                  type: integer
                esItv:
                  type: boolean
              required: [descripcion, fecha, vehiculoMatricula]
      responses:
        '201':
          description: Revisión creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Revision'
        '401':
          description: No autorizado.

