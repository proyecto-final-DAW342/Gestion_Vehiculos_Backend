openapi: 3.0.0
info:
  title: Gestión de Vehículos API
  description: API para la administración de flotas de vehículos, conductores, trayectos y mantenimientos.
  version: 1.1.0
servers:
  - url: /api
    description: Servidor Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        dni:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        telefono:
          type: string
        isActive:
          type: boolean
        roles:
          type: array
          items:
            type: string
      required:
        - dni
        - email
        - fullName
        - telefono

    Conductor:
      type: object
      properties:
        dni:
          type: string
        nombre:
          type: string
        apellidos:
          type: string
        telefono:
          type: string
        direccion:
          type: string
        fechaNacimiento:
          type: string
          format: date-time
      required:
        - dni
        - nombre
        - apellidos
        - telefono
        - direccion
        - fechaNacimiento

    Vehiculo:
      type: object
      properties:
        matricula:
          type: string
        marca:
          type: string
        modelo:
          type: string
        fechaCompra:
          type: string
          format: date-time
        anyosAntiguedad:
          type: integer
        tipo:
          type: string
        kilometrosTotales:
          type: number
        alimentacion:
          type: string
        precio:
          type: number
        nuevo:
          type: boolean
        gastoPorKm:
          type: number
        imagenes:
          type: array
          description: "Format depends on the method (POST uses object with id, PATCH uses URL string)"
          items:
            anyOf:
              - type: object
                properties:
                  id:
                    type: integer
              - type: string
                format: uri
        conductorDni:
          type: string
          nullable: true
        averiaId:
          type: integer
          nullable: true
      required:
        - matricula
        - marca
        - modelo
        - fechaCompra
        - anyosAntiguedad
        - tipo
        - kilometrosTotales
        - alimentacion
        - nuevo
        - gastoPorKm

    Averia:
      type: object
      properties:
        id:
          type: integer
        descripcion:
          type: string
        fechaAveria:
          type: string
          format: date-time
        fechaComienzoReparacion:
          type: string
          format: date-time
        fechaFinReparacion:
          type: string
          format: date-time
        lugarReparacion:
          type: string
        costeReparacion:
          type: number
      required:
        - id
        - descripcion
        - fechaAveria
        - fechaComienzoReparacion
        - fechaFinReparacion
        - lugarReparacion
        - costeReparacion

    Trayecto:
      type: object
      properties:
        id:
          type: integer
        horaSalida:
          type: string
          format: date-time
        horaLlegada:
          type: string
          format: date-time
        origen:
          type: string
        destino:
          type: string
        distanciaEnKm:
          type: number
        viajeId:
          type: integer
          nullable: true
      required:
        - id
        - horaSalida
        - horaLlegada
        - origen
        - destino
        - distanciaEnKm

    Viaje:
      type: object
      properties:
        id:
          type: integer
        trayectos:
          type: array
          items:
            $ref: '#/components/schemas/Trayecto'
      required:
        - id

    Revision:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date-time
        lugar:
          type: string
        activo:
          type: boolean
        aprobada:
          type: boolean
      required:
        - id
        - fecha
        - lugar
        - activo
        - aprobada

    InfoTrayecto:
      type: object
      properties:
        id:
          type: integer
        activo:
          type: boolean
        completado:
          type: boolean
        gasto:
          type: number
        conductorDni:
          type: string
          nullable: true
        trayectoId:
          type: integer
          nullable: true
      required:
        - id
        - activo
        - completado
        - gasto

    Image:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        nombre:
          type: string
        vehiculoMatricula:
          type: string
          nullable: true
        conductorDni:
          type: string
          nullable: true
      required:
        - id
        - url
        - nombre

paths:
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                fullName:
                  type: string
                dni:
                  type: string
                telefono:
                  type: string
              required: [email, password, fullName, dni, telefono]
      responses:
        '201':
          description: Usuario registrado exitosamente
        '400':
          description: Faltan campos requeridos
        '409':
          description: El usuario ya existe

  /auth/login:
    post:
      summary: Iniciar sesión
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dni:
                  type: string
                password:
                  type: string
              required: [dni, password]
      responses:
        '201':
          description: Login exitoso
        '400':
          description: Faltan campos requeridos
        '401':
          description: Credenciales inválidas

  /auth/check-status:
    get:
      summary: Verificar el estado de la sesión
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token válido
        '401':
          description: No autorizado

  /users:
    get:
      summary: Listar todos los usuarios
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{dni}:
    get:
      summary: Obtener un usuario por DNI
      tags:
        - Users
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario encontrado
        '404':
          description: Usuario no encontrado

  /vehiculos:
    get:
      summary: Listar vehículos
      tags:
        - Vehiculos
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de vehículos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehiculo'
    post:
      summary: Crear un vehículo
      tags:
        - Vehiculos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vehiculo'
            example:
              matricula: "1234ABC"
              marca: "Toyota"
              modelo: "Corolla"
              fechaCompra: "2023-01-01T00:00:00Z"
              anyosAntiguedad: 1
              tipo: "Turismo"
              kilometrosTotales: 1000
              alimentacion: "Gasolina"
              precio: 25000
              nuevo: true
              gastoPorKm: 0.15
              imagenes:
                - id: 1
                - id: 2
      responses:
        '201':
          description: Vehículo creado exitosamente
        '401':
          description: No autorizado
        '409':
          description: Matrícula o marca ya existen

  /vehiculos/{matricula}:
    get:
      summary: Obtener vehículo por matrícula
      tags:
        - Vehiculos
      parameters:
        - name: matricula
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vehículo encontrado
        '404':
          description: Vehículo no encontrado
    patch:
      summary: Actualizar vehículo
      tags:
        - Vehiculos
      security:
        - bearerAuth: []
      parameters:
        - name: matricula
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vehiculo'
            example:
              kilometrosTotales: 1500
              imagenes:
                - "https://res.cloudinary.com/demo/image/upload/sample.jpg"
      responses:
        '200':
          description: Vehículo actualizado
        '404':
          description: Vehículo no encontrado
    delete:
      summary: Eliminar vehículo
      tags:
        - Vehiculos
      security:
        - bearerAuth: []
      parameters:
        - name: matricula
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vehículo eliminado
        '404':
          description: Vehículo no encontrado

  /conductores:
    get:
      summary: Listar conductores
      tags:
        - Conductores
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de conductores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conductor'
    post:
      summary: Crear conductor
      tags:
        - Conductores
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conductor'
      responses:
        '201':
          description: Conductor creado
        '401':
          description: No autorizado
        '409':
          description: DNI ya existe

  /conductores/{dni}:
    get:
      summary: Obtener conductor
      tags:
        - Conductores
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conductor encontrado
        '404':
          description: Conductor no encontrado
    patch:
      summary: Actualizar conductor
      tags:
        - Conductores
      security:
        - bearerAuth: []
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conductor'
      responses:
        '200':
          description: Conductor actualizado
        '404':
          description: Conductor no encontrado
    delete:
      summary: Eliminar conductor
      tags:
        - Conductores
      security:
        - bearerAuth: []
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conductor eliminado
        '404':
          description: Conductor no encontrado

  /averias:
    get:
      summary: Listar averías
      tags:
        - Averias
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de averías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Averia'
    post:
      summary: Crear avería
      tags:
        - Averias
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Averia'
      responses:
        '201':
          description: Avería creada
        '401':
          description: No autorizado
        '409':
          description: ID ya existe

  /averias/{id}:
    get:
      summary: Obtener avería
      tags:
        - Averias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Avería encontrada
        '404':
          description: Avería no encontrada
    patch:
      summary: Actualizar avería
      tags:
        - Averias
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Averia'
      responses:
        '200':
          description: Avería actualizada
        '404':
          description: Avería no encontrada
    delete:
      summary: Eliminar avería
      tags:
        - Averias
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Avería eliminada
        '404':
          description: Avería no encontrada

  /trayectos:
    get:
      summary: Listar trayectos
      tags:
        - Trayectos
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de trayectos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trayecto'
    post:
      summary: Crear trayecto
      tags:
        - Trayectos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trayecto'
      responses:
        '201':
          description: Trayecto creado

  /trayectos/{id}:
    get:
      summary: Obtener trayecto
      tags:
        - Trayectos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trayecto encontrado
        '404':
          description: Trayecto no encontrado
    patch:
      summary: Actualizar trayecto
      tags:
        - Trayectos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trayecto'
      responses:
        '200':
          description: Trayecto actualizado
    delete:
      summary: Eliminar trayecto
      tags:
        - Trayectos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trayecto eliminado

  /viajes:
    get:
      summary: Listar viajes
      tags:
        - Viajes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de viajes
    post:
      summary: Crear viaje
      tags:
        - Viajes
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Viaje creado

  /viajes/{id}:
    get:
      summary: Obtener viaje
      tags:
        - Viajes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Viaje encontrado
    delete:
      summary: Eliminar viaje
      tags:
        - Viajes
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Viaje eliminado

  /revisiones:
    get:
      summary: Listar revisiones
      tags:
        - Revisiones
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de revisiones
    post:
      summary: Crear revisión
      tags:
        - Revisiones
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Revision'
      responses:
        '201':
          description: Revisión creada

  /info-trayectos:
    get:
      summary: Listar info de trayectos
      tags:
        - Info Trayectos
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de info de trayectos
    post:
      summary: Crear info de trayecto
      tags:
        - Info Trayectos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoTrayecto'
      responses:
        '201':
          description: Info de trayecto creada

  /info-trayectos/{id}:
    get:
      summary: Obtener info de trayecto
      tags:
        - Info Trayectos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Info encontrada
    patch:
      summary: Actualizar info de trayecto
      tags:
        - Info Trayectos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoTrayecto'
      responses:
        '200':
          description: Info actualizada
    delete:
      summary: Eliminar info de trayecto
      tags:
        - Info Trayectos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Info eliminada

  /files:
    get:
      summary: Listar recursos de Cloudinary (Imágenes guardadas en BD)
      tags:
        - Files
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de imágenes
    post:
      summary: Guardar referencia de imagen en BD
      tags:
        - Files
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                nombre:
                  type: string
              required: [url, nombre]
      responses:
        '201':
          description: Referencia guardada

  /files/upload:
    get:
      summary: Listar recursos directamente de la carpeta en Cloudinary
      tags:
        - Files
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Lista de recursos de Cloudinary
    post:
      summary: Subir imagen binaria a Cloudinary
      tags:
        - Files
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Imagen subida y referencia guardada
