                $ref: '#/components/schemas/Revision'
        '404':
          description: Revisión no encontrada.
    patch:
      summary: Modificar revisión
      tags:
        - Revisiones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descripcion:
                  type: string
                lugar:
                  type: string
                aprobada:
                  type: boolean
                fecha:
                  type: string
                  format: date-time
                costo:
                  type: number
                visible:
                  type: boolean
                vehiculoMatricula:
                  type: string
                viajeId:
                  type: string
                  format: uuid
                plantillaId:
                  type: string
                  format: uuid
                kilometrosActuales:
                  type: integer
                esItv:
                  type: boolean
      responses:
        '200':
          description: Revisión actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Revision'
        '404':
          description: Revisión no encontrada.
    delete:
      summary: Eliminar revisión
      tags:
        - Revisiones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Revisión eliminada físicamente.
        '404':
          description: Revisión no encontrada.
