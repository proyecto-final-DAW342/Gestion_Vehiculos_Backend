            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descripcion:
                  type: string
                fechaAveria:
                  type: string
                  format: date-time
                fechaComienzoReparacion:
                  type: string
                  format: date-time
                fechaFinReparacion:
                  type: string
                  format: date-time
                lugarReparacion:
                  type: string
                costeReparacion:
                  type: number
                resuelta:
                  type: boolean
                visible:
                  type: boolean
                vehiculoMatricula:
                  type: string
                userDni:
