            schema:
              type: object
              properties:
                nombre:
                  type: string
                esItv:
                  type: boolean
                rangos:
                  type: array
                  items:
                    type: object
                    properties:
                      desdeAnyo:
                        type: integer
                      desdeKilometro:
                        type: integer
                      frecuenciaMeses:
                        type: integer
                      frecuenciaKilometros:
                        type: integer
                vehiculos:
                  type: array
                  items:
