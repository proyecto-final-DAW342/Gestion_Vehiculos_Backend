                trigger:
                  $ref: '#/components/schemas/PLANTILLA_TRIGGER'
                frecuencia:
                  $ref: '#/components/schemas/PLANTILLA_FRECUENCIA'
                margenDias:
                  type: integer
      responses:
        '200':
          description: Plantilla modificada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plantilla'
        '404':
          description: Plantilla no encontrada.
    delete:
      summary: Eliminar plantilla
      tags:
        - Plantillas
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plantilla eliminada físicamente.
        '404':
          description: Plantilla no encontrada.
        '401':
          description: No autorizado.

  # ========================================================
  # RANGOS
  # ========================================================
  /rangos:
    get:
      summary: Listar rangos de frecuencias
      tags:
        - Rangos
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de rangos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rango'
    post:
      summary: Crear un rango de frecuencias
      tags:
        - Rangos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                desdeAnyo:
                  type: integer
                desdeKilometro:
                  type: integer
                frecuenciaMeses:
                  type: integer
                frecuenciaKilometros:
                  type: integer
                plantillaId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Rango creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rango'

  /rangos/{id}:
    get:
      summary: Obtener rango por ID
      tags:
        - Rangos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rango encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rango'
        '404':
          description: Rango no encontrado.
    patch:
      summary: Modificar rango de frecuencias
      tags:
        - Rangos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                desdeAnyo:
                  type: integer
                desdeKilometro:
                  type: integer
                frecuenciaMeses:
                  type: integer
                frecuenciaKilometros:
                  type: integer
                plantillaId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Rango actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rango'
        '404':
          description: Rango no encontrado.
    delete:
      summary: Eliminar rango de frecuencia
      tags:
        - Rangos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rango eliminado.
        '404':
          description: Rango no encontrado.
        '401':
          description: No autorizado.

  # ========================================================
  # ESTACIONES (SERVICIOS EXTERNOS)
  # ========================================================
  /estaciones:
    post:
      summary: Consultar precios y estadísticas de estaciones de servicio (Gasolineras)
      description: |
        Realiza una consulta a la API pública de estaciones de servicio de España para procesar el combustible seleccionado (`idProducto`).
        Permite filtrar a nivel autonómico (`IDCCAA`), provincial (`idProvincia`) o municipal (`idMunicipio`), retornando el precio medio e información detallada de la gasolinera más barata.
      tags:
        - Estaciones
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IDCCAA:
                  type: string
                  description: ID de la Comunidad Autónoma.
                idProvincia:
                  type: string
                  description: ID opcional de la Provincia.
                idMunicipio:
                  type: string
                  description: ID opcional del Municipio.
                idProducto:
                  type: string
                  description: ID de tipo de combustible (ej. '1' para Gasolina 95 E5).
              required: [IDCCAA, idProducto]
      responses:
        '201':
          description: Precios calculados y estadísticas procesadas con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstacionesProcesadas'
        '400':
          description: Error al consultar API de gasolineras o parámetros faltantes.

  # ========================================================
  # FILES & CLOUDINARY
  # ========================================================
  /files:
    get:
      summary: Listar referencias de imágenes de la Base de Datos
      description: Retorna la lista de imágenes guardadas físicamente en la BD local con sus relaciones de vehículo/conductor.
      tags:
        - Files
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de referencias de imagen.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
    post:
      summary: Guardar referencia de imagen local en BD
      description: Guarda la URL y nombre de una imagen externa (fromCloudinary = false).
      tags:
        - Files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                nombre:
                  type: string
                vehiculoMatricula:
                  type: string
                conductorDni:
                  type: string
              required: [url, nombre]
      responses:
        '201':
          description: Referencia creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '401':
          description: No autorizado.

  /files/{id}:
    get:
      summary: Obtener detalle de imagen guardada
      tags:
        - Files
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ficha de imagen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '404':
          description: Imagen no encontrada en la BD.
    delete:
      summary: Eliminar referencia de imagen
      description: Elimina la imagen de la Base de Datos y de Cloudinary si correspondía.
      tags:
        - Files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Imagen eliminada.
        '404':
          description: Imagen no encontrada.
        '401':
          description: No autorizado.

  /files/upload:
    get:
      summary: Listar recursos directamente de Cloudinary
      description: Consulta las imágenes cargadas directamente en el Asset Folder de Cloudinary del proyecto.
      tags:
        - Files
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Listado exitoso directo de Cloudinary.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      summary: Subir imagen binaria a Cloudinary
      description: Recibe una imagen física binaria mediante Form Data, la sube al repositorio de Cloudinary, y crea la referencia respectiva en la Base de Datos asociándola a un vehículo o conductor opcionalmente.
      tags:
        - Files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Imagen física a subir.
                vehiculoMatricula:
                  type: string
                  description: Matrícula opcional del vehículo a asociar.
                conductorDNI:
                  type: string
                  description: DNI opcional del conductor a asociar.
              required: [image]
      responses:
        '201':
          description: Imagen subida y registrada en la Base de Datos con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '401':
          description: No autorizado.
