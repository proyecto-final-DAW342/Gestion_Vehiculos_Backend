openapi: 3.0.0
info:
  title: Gestión de Vehículos API
  description: |
    API para la administración de flotas de vehículos, conductores, trayectos, viajes, mantenimientos y estaciones de servicio.
    Esta API soporta la autenticación mediante tokens JWT portados en la cabecera `Authorization: Bearer <token>`.
  version: 1.2.0
servers:
  - url: /api
    description: Servidor Local

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ------------------ ENUMS ------------------
    PLANTILLA_TRIGGER:
      type: string
      enum: [ANYO, KM]
      description: Tipo de disparador para la plantilla de revisión (por años de antigüedad o por kilómetros).

    PLANTILLA_FRECUENCIA:
      type: string
      enum: [MESES, KM]
      description: Unidad de frecuencia para la plantilla (cada X meses o cada X kilómetros).

    ESTADO_VIAJE:
      type: string
      enum: [PENDIENTE, ACTIVO, FINALIZADO]
      description: Estado en el que se encuentra un viaje.

    ESTADO_VEHICULO:
      type: string
      enum: [DISPONIBLE, EN_TRAYECTO, AVERIADO]
      description: Estado actual del vehículo.

    # ------------------ SCHEMAS PRINCIPALES ------------------
    User:
      type: object
      properties:
        dni:
          type: string
          description: DNI único del usuario.
        email:
          type: string
          format: email
          description: Correo electrónico del usuario.
        fullName:
          type: string
          description: Nombre completo del usuario.
        telefono:
          type: string
          description: Número de teléfono.
        isActive:
          type: boolean
          default: true
          description: Indica si la cuenta de usuario está activa.
        roles:
          type: array
          items:
            type: string
          default: ["user"]
          description: Roles asignados al usuario (ej. admin, user).
      required:
        - dni
        - email
        - fullName
        - telefono

    Conductor:
      type: object
      properties:
        dni:
          type: string
          description: DNI único del conductor.
        nombre:
          type: string
          description: Nombre del conductor.
        apellidos:
          type: string
          description: Apellidos del conductor.
        telefono:
          type: string
          description: Teléfono de contacto.
        direccion:
          type: string
          description: Dirección física del conductor.
        fechaNacimiento:
          type: string
          format: date-time
          nullable: true
          description: Fecha de nacimiento.
        userDni:
          type: string
          nullable: true
          description: DNI del usuario asociado (si existe).
        image:
          $ref: '#/components/schemas/Image'
          nullable: true
      required:
        - dni
        - nombre
        - apellidos
        - telefono
        - direccion

    Vehiculo:
      type: object
      properties:
        matricula:
          type: string
          description: Matrícula única del vehículo (clave primaria).
        marca:
          type: string
          description: Marca del fabricante.
        modelo:
          type: string
          description: Modelo específico.
        fechaCompra:
          type: string
          format: date-time
          description: Fecha de adquisición.
        fechaMatriculacion:
          type: string
          format: date-time
          description: Fecha de matriculación oficial.
        tipo:
          type: string
          description: Tipo de vehículo (ej. Turismo, Furgoneta, SUV).
        kilometrosTotales:
          type: number
          format: double
          description: Odómetro acumulado en kilómetros.
        alimentacion:
          type: string
          description: Tipo de combustible o energía (Gasolina, Diésel, Eléctrico, Híbrido).
        precio:
          type: number
          format: double
          default: 0
          description: Precio o valor estimado.
        gastoCombustiblePorKiloetro:
          type: number
          format: double
          description: Consumo estimado de combustible/energía por kilómetro.
        capacidadTanqueCombustible:
          type: number
          format: double
          description: Capacidad total del depósito en litros.
        estado:
          $ref: '#/components/schemas/ESTADO_VEHICULO'
        conductorDni:
          type: string
          nullable: true
          description: DNI del conductor asignado actualmente.
        plantillas:
          type: array
          items:
            $ref: '#/components/schemas/Plantilla'
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        revisiones:
          type: array
          items:
            $ref: '#/components/schemas/Revision'
        averias:
          type: array
          items:
            $ref: '#/components/schemas/Averia'
        viajes:
          type: array
          items:
            $ref: '#/components/schemas/Viaje'
      required:
        - matricula
        - marca
        - modelo
        - fechaCompra
        - fechaMatriculacion
        - tipo
        - kilometrosTotales
        - alimentacion
        - gastoCombustiblePorKiloetro
        - capacidadTanqueCombustible

    Averia:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único autogenerado (UUID).
        descripcion:
          type: string
          description: Explicación o detalles de la avería.
        fechaAveria:
          type: string
          format: date-time
          description: Fecha en que ocurrió o se detectó la avería.
        fechaComienzoReparacion:
          type: string
          format: date-time
          nullable: true
          description: Fecha de inicio de los trabajos de taller.
        fechaFinReparacion:
          type: string
          format: date-time
          nullable: true
          description: Fecha de finalización e inspección del vehículo.
        lugarReparacion:
          type: string
          nullable: true
          description: Taller o ubicación donde se repara el vehículo.
        costeReparacion:
          type: number
          format: double
          nullable: true
          description: Coste monetario de la reparación.
        resuelta:
          type: boolean
          default: false
          description: Indica si la avería ya está reparada e inactiva.
        visible:
          type: boolean
          default: true
          description: Control de visibilidad lógica.
        userDniHard:
          type: string
          description: DNI del usuario que reportó la avería.
        vehiculoMatriculaHard:
          type: string
          description: Matrícula del vehículo averiado.
        vehiculoMatricula:
          type: string
          nullable: true
          description: Matrícula del vehículo relacionado administrativamente.
        userDni:
          type: string
          nullable: true
          description: DNI del usuario relacionado administrativamente.
      required:
        - descripcion
        - fechaAveria
        - userDniHard
        - vehiculoMatriculaHard

    Trayecto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID único del trayecto.
        horaSalida:
          type: string
          format: date-time
          description: Hora y fecha de partida.
        horaLlegada:
          type: string
          format: date-time
          description: Hora y fecha de llegada.
        origen:
          type: string
          description: Dirección o punto geográfico de inicio.
        destino:
          type: string
          description: Dirección o punto geográfico de fin.
        distanciaEnKm:
          type: number
          format: double
          description: Distancia en kilómetros del recorrido.
        viajeId:
          type: string
          format: uuid
          nullable: true
          description: ID del viaje contenedor.
      required:
        - horaSalida
        - horaLlegada
        - origen
        - destino
        - distanciaEnKm

    Viaje:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID del viaje.
        descripcion:
          type: string
          description: Descripción o motivo del viaje comercial.
        kmSalida:
          type: number
          format: double
          nullable: true
          description: Kilometraje registrado en el odómetro al iniciar.
        kmLlegada:
          type: number
          format: double
          nullable: true
          description: Kilometraje registrado en el odómetro al llegar.
        origen:
          type: string
          description: Punto de origen del viaje general.
        destino:
          type: string
          description: Punto de destino del viaje general.
        porcentajeCombustibleInicio:
          type: number
          format: double
          nullable: true
          description: Porcentaje inicial del tanque de combustible.
        porcentajeCombustibleFinal:
          type: number
          format: double
          nullable: true
          description: Porcentaje final del tanque de combustible.
        litrosCombustibleInicio:
          type: number
          format: double
          nullable: true
          description: Litros iniciales de combustible.
        litrosCombustibleFinal:
          type: number
          format: double
          nullable: true
          description: Litros finales de combustible.
        visible:
          type: boolean
          default: true
        estado:
          $ref: '#/components/schemas/ESTADO_VIAJE'
        fechaSalida:
          type: string
          format: date-time
          nullable: true
        fechaLlegada:
          type: string
          format: date-time
          nullable: true
        vehiculoMatricula:
          type: string
          nullable: true
        conductorDni:
          type: string
          nullable: true
        trayectos:
          type: array
          items:
            $ref: '#/components/schemas/Trayecto'
      required:
        - descripcion
        - origen
        - destino

    Revision:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la revisión.
        descripcion:
          type: string
          description: Detalles de la inspección o revisión periódica.
        fecha:
          type: string
          format: date-time
          description: Fecha programada o realizada.
        lugar:
          type: string
          nullable: true
          description: Dirección o taller de la revisión.
        aprobada:
          type: boolean
          nullable: true
          description: Indica si el vehículo pasó satisfactoriamente la revisión.
        costo:
          type: number
          format: double
          nullable: true
          description: Costo total de la revisión/mantenimiento.
        kilometrosActuales:
          type: integer
          nullable: true
          description: Odómetro del vehículo al momento de la revisión.
        visible:
          type: boolean
          default: true
        esItv:
          type: boolean
          default: false
          description: Indica si corresponde a la ITV obligatoria.
        matriculaTexto:
          type: string
          description: Matrícula de texto vinculada.
        vehiculoMatricula:
          type: string
          nullable: true
        viajeId:
          type: string
          format: uuid
          nullable: true
        plantillaId:
          type: string
          format: uuid
          nullable: true
      required:
        - descripcion
        - fecha
        - matriculaTexto

    Plantilla:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID de la plantilla de revisión periódica.
        nombre:
          type: string
          description: Nombre de la plantilla de revisiones programadas (ej. Filtro de Aceite).
        esItv:
          type: boolean
          default: false
        margenDias:
          type: integer
          default: 0
          description: Margen de días permitidos para realizar la revisión.
        trigger:
          $ref: '#/components/schemas/PLANTILLA_TRIGGER'
        frecuencia:
          $ref: '#/components/schemas/PLANTILLA_FRECUENCIA'
        rangos:
          type: array
          items:
            $ref: '#/components/schemas/Rango'
        vehiculos:
          type: array
          items:
            $ref: '#/components/schemas/Vehiculo'
      required:
        - nombre
        - trigger
        - frecuencia

    Rango:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID del rango de la plantilla.
        desdeAnyo:
          type: integer
          nullable: true
          description: Año mínimo de antigüedad del vehículo para aplicar el rango.
        desdeKilometro:
          type: integer
          nullable: true
          description: Kilometraje mínimo del vehículo para aplicar el rango.
        frecuenciaMeses:
          type: integer
          nullable: true
          description: Frecuencia de meses en los que debe realizarse la revisión para este rango.
        frecuenciaKilometros:
          type: integer
          nullable: true
          description: Frecuencia de kilómetros en los que debe realizarse la revisión para este rango.
        plantillaId:
          type: string
          format: uuid
          nullable: true

    Image:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        nombre:
          type: string
          description: Nombre del archivo/Identificador público de Cloudinary.
        fromCloudinary:
          type: boolean
          description: Indica si el archivo está alojado en Cloudinary.
        vehiculoMatricula:
          type: string
          nullable: true
        conductorDni:
          type: string
          nullable: true
      required:
        - id
        - url
        - nombre

    # ------------------ SCHEMAS DE RESPUESTA ESPECIALES ------------------
    EstacionFormato:
      type: object
      properties:
        direccion:
          type: string
          nullable: true
        precio:
          type: number
          format: double
          nullable: true
        latitud:
          type: string
          nullable: true
        "longitud (WGS84)":
          type: string
          nullable: true

    ProvinciaEstacionesFormato:
      type: object
      properties:
        municipio:
          type: string
          nullable: true
        estaciones:
          type: array
          items:
            $ref: '#/components/schemas/EstacionFormato'
          nullable: true

    CcaaEstacionesFormato:
      type: object
      properties:
        provincia:
          type: string
          nullable: true
        municipios:
          type: array
          items:
            $ref: '#/components/schemas/ProvinciaEstacionesFormato'
          nullable: true

    EstacionesProcesadas:
      type: object
      properties:
        precioMedioCCAA:
          type: number
          format: double
          nullable: true
        direccionEstacionMasBarataCCAA:
          type: string
          nullable: true
        provinciaEstacionMasBarataCCAA:
          type: string
          nullable: true
        municipioEstacionMasBarataCCAA:
          type: string
          nullable: true
        precioEstacionMasBarataCCAA:
          type: number
          format: float
          nullable: true
        estacionesCCAA:
          type: array
          items:
            $ref: '#/components/schemas/CcaaEstacionesFormato'
          nullable: true
        precioMedioProvincia:
          type: number
          format: double
          nullable: true
        direccionEstacionMasBarataProvincia:
          type: string
          nullable: true
        municipioEstacionMasBarataProvincia:
          type: string
          nullable: true
        precioEstacionMasBarataProvincia:
          type: number
          format: double
          nullable: true
        estacionesProvincia:
          type: array
          items:
            $ref: '#/components/schemas/ProvinciaEstacionesFormato'
          nullable: true
        precioMedioMunicipio:
          type: number
          format: double
          nullable: true
        direccionEstacionMasBarataMunicipio:
          type: string
          nullable: true
        precioEstacionMasBarataMunicipio:
          type: number
          format: double
          nullable: true
        estacionesMunicipio:
          type: array
          items:
            $ref: '#/components/schemas/EstacionFormato'
          nullable: true

paths:
  # ========================================================
  # AUTHENTICATION
  # ========================================================
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      description: Crea una cuenta de usuario y asocia automáticamente con conductor si el DNI coincide.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dni:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                fullName:
                  type: string
                telefono:
                  type: string
                isActive:
                  type: boolean
                roles:
                  type: array
                  items:
                    type: string
              required: [dni, email, password, fullName, telefono]
      responses:
        '201':
          description: Usuario registrado exitosamente (devuelve el usuario creado sin contraseña).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Datos inválidos o faltantes.
        '409':
          description: DNI o correo electrónico ya registrados.

  /auth/login:
    post:
      summary: Iniciar sesión en el sistema
      description: Autentica al usuario usando DNI y contraseña, retornando información del perfil y el token JWT.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dni:
                  type: string
                password:
                  type: string
              required: [dni, password]
      responses:
        '201':
          description: Login exitoso, se retorna el token JWT válido para las llamadas subsecuentes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dni:
                    type: string
                  email:
                    type: string
                  fullName:
                    type: string
                  isActive:
                    type: boolean
                  roles:
                    type: array
                    items:
                      type: string
                  token:
                    type: string
                    description: Token JWT con validez de 2 horas.
        '400':
          description: Falta DNI o contraseña.
        '401':
          description: Contraseña incorrecta.
        '404':
          description: Usuario no encontrado con ese DNI.

  /auth/check-status:
    get:
      summary: Verificar el estado de la sesión
      description: Retorna información básica del usuario si el token JWT proporcionado es válido.
      tags:
        - Auth
      responses:
        '200':
          description: Token verificado con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  fullName:
                    type: string
                  isActive:
                    type: boolean
                  roles:
                    type: array
                    items:
                      type: string
        '401':
          description: No autorizado, token inválido o expirado.

  # ========================================================
  # USERS
  # ========================================================
  /users:
    get:
      summary: Listar todos los usuarios
      description: Obtiene la lista completa de usuarios del sistema con relaciones (requiere sesión).
      tags:
        - Users
      responses:
        '200':
          description: Listado exitoso de usuarios.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: No autorizado.

  /users/{dni}:
    get:
      summary: Obtener un usuario por DNI
      description: Obtiene los detalles de un usuario. Requiere ser administrador o el propio usuario titular.
      tags:
        - Users
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
          description: DNI del usuario a consultar.
      responses:
        '200':
          description: Datos del usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado.
        '401':
          description: No autorizado.
    patch:
      summary: Actualizar un usuario
      description: Actualiza de forma parcial o total los campos del usuario. Requiere ser administrador o el mismo usuario.
      tags:
        - Users
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                fullName:
                  type: string
                telefono:
                  type: string
                isActive:
                  type: boolean
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Usuario modificado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado.
        '401':
          description: No autorizado.
    delete:
      summary: Eliminar un usuario
      description: Elimina un usuario por DNI de forma física (sólo Administrador).
      tags:
        - Users
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario eliminado correctamente.
        '404':
          description: Usuario no encontrado.
        '401':
          description: No autorizado / No es administrador.

  # ========================================================
  # VEHICULOS
  # ========================================================
  /vehiculos:
    get:
      summary: Listar vehículos
      description: Lista paginada de todos los vehículos de la flota con conductor, revisiones, viajes y averías incluidas.
      tags:
        - Vehiculos
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Cantidad máxima de registros a retornar.
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Desplazamiento de registros iniciales.
      responses:
        '200':
          description: Listado exitoso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehiculo'
    post:
      summary: Crear un vehículo
      description: Registra un nuevo vehículo en la flota.
      tags:
        - Vehiculos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                matricula:
                  type: string
                marca:
                  type: string
                modelo:
                  type: string
                fechaCompra:
                  type: string
                  format: date-time
                fechaMatriculacion:
                  type: string
                  format: date-time
                tipo:
                  type: string
                kilometrosTotales:
                  type: number
                alimentacion:
                  type: string
                precio:
                  type: number
                gastoCombustiblePorKiloetro:
                  type: number
                capacidadTanqueCombustible:
                  type: number
                estado:
                  $ref: '#/components/schemas/ESTADO_VEHICULO'
                conductorDni:
                  type: string
                plantillas:
                  type: array
                  items:
                    type: string
                  description: Array de IDs de plantillas de revisiones a asociar.
                imagenes:
                  type: array
                  items:
                    type: string
                  description: Array de IDs de imágenes ya subidas a asociar.
              required: [matricula, marca, modelo, fechaCompra, fechaMatriculacion, tipo, kilometrosTotales, alimentacion, gastoCombustiblePorKiloetro, capacidadTanqueCombustible]
      responses:
        '201':
          description: Vehículo creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehiculo'
        '400':
          description: Validación errónea de datos.
        '401':
          description: No autorizado.

  /vehiculos/{matricula}:
    get:
      summary: Obtener vehículo por matrícula
      description: Retorna la información completa de un vehículo concreto.
      tags:
        - Vehiculos
      parameters:
        - name: matricula
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del vehículo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehiculo'
        '404':
          description: Vehículo no encontrado.
    patch:
      summary: Actualizar vehículo
      description: Actualiza de forma parcial o total las relaciones y propiedades del vehículo (soporta asociar/desasociar plantillas).
      tags:
        - Vehiculos
      parameters:
        - name: matricula
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                marca:
                  type: string
