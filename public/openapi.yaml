  # ========================================================
  # CONDUCTORES
  # ========================================================
  /conductores:
    get:
      summary: Listar conductores
      description: Devuelve la lista paginada de perfiles de conductor.
      tags:
        - Conductores
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de conductores.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conductor'
    post:
      summary: Crear conductor
      description: Registra un nuevo conductor y vincula su perfil al usuario de id DNI si existe en BD.
      tags:
        - Conductores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dni:
                  type: string
                nombre:
                  type: string
                apellidos:
                  type: string
                telefono:
                  type: string
                direccion:
                  type: string
                fechaNacimiento:
                  type: string
                  format: date-time
                vehiculo:
                  type: array
                  items:
                    type: string
                  description: Array de matrículas de vehículos a conectar.
                image:
                  type: object
                  properties:
                    nombre:
                      type: string
                    url:
                      type: string
                    fromCloudinary:
                      type: boolean
              required: [dni, nombre, apellidos, telefono, direccion]
      responses:
        '201':
          description: Conductor creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '401':
          description: No autorizado.
        '409':
          description: DNI duplicado.

  /conductores/{dni}:
    get:
      summary: Obtener perfil de conductor
      description: Retorna la ficha completa de un conductor.
      tags:
        - Conductores
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conductor encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '404':
          description: Conductor no encontrado.
    patch:
      summary: Actualizar conductor
      description: Modifica los campos básicos y relaciones de imagen/vehículos del conductor.
      tags:
        - Conductores
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                apellidos:
                  type: string
                telefono:
                  type: string
                direccion:
                  type: string
                fechaNacimiento:
                  type: string
                  format: date-time
                vehiculo:
                  type: array
                  items:
                    type: string
                image:
                  type: object
                  nullable: true
                  properties:
                    nombre:
                      type: string
                    url:
                      type: string
                    fromCloudinary:
                      type: boolean
      responses:
        '200':
          description: Conductor actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '404':
          description: Conductor no encontrado.
    delete:
      summary: Eliminar conductor
      description: Elimina permanentemente el perfil y borra su foto asociada en Cloudinary.
      tags:
        - Conductores
      parameters:
        - name: dni
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conductor eliminado.
        '404':
          description: Conductor no encontrado.
        '401':
          description: No autorizado.

